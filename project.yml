name: StellarVolumiO

# StellarVolumiO is a Swift Package under StellarVolumiO/ (sources) +
# Package.swift (dependencies). Package.swift remains the canonical place
# to add Swift dependencies; this project.yml is just a thin Xcode-project
# wrapper so xcodebuild can produce an installable iOS .app for device
# deployment (Swift Packages alone can't be signed + installed).
#
# Regenerate with:  xcodegen generate --spec project.yml
# Build for device: scripts/deploy-to-device.sh

packages:
  socket.io-client-swift:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.0"

options:
  bundleIdPrefix: fit.stellar
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 3S2JYQ4JNX
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  StellarVolumiO:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StellarVolumiO
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fit.stellar.remote
        PRODUCT_NAME: StellarVolumiO
        # Generate the Info.plist from the `info` block below — no separate
        # plist file on disk. Matches the rest of the repo's "code is the
        # source of truth" pattern.
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 3S2JYQ4JNX
        CODE_SIGN_STYLE: Automatic
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      configs:
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    info:
      path: GeneratedInfo.plist     # placeholder; overridden by GENERATE_INFOPLIST_FILE
      properties:
        CFBundleDisplayName: "Stellar"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: YES
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # The app talks to the Mac backend over plain HTTP on the LAN.
        # ATS would block this without an exception. Scope the exception
        # narrowly to the local-network domain rather than disabling ATS
        # globally.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
        # iOS 14+ requires explicit permission before scanning the local
        # network. Used by BackendDiscoveryService to find Stellar backends
        # advertising `_stellar._tcp` via Bonjour.
        NSLocalNetworkUsageDescription: "Stellar discovers your backend server on this Wi-Fi network so the app can control playback."
        NSBonjourServices:
          - _stellar._tcp
        # App uses no encryption beyond what's exempt under US export law
        # (HTTPS via system frameworks is exempt; we don't ship any custom
        # crypto). Setting this here clears the "Missing Export Compliance"
        # blocker on every App Store Connect upload.
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - package: socket.io-client-swift
        product: SocketIO

  StellarVolumiOTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StellarVolumiOTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fit.stellar.remote.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StellarVolumiO.app/$(BUNDLE_EXECUTABLE_NAME:default=StellarVolumiO)"
    dependencies:
      - target: StellarVolumiO

schemes:
  StellarVolumiO:
    build:
      targets:
        StellarVolumiO: all
        StellarVolumiOTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StellarVolumiOTests
